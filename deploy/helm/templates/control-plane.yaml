# Control plane (hardened pod). Holds NO standing write credentials and mounts
# only the read-only service account token. Scanner execution (execution plane)
# is isolated under the sandbox RuntimeClass when enabled (BUILD.md §4).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-sentinel.fullname" . }}-control-plane
  labels:
    {{- include "k8s-sentinel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "k8s-sentinel.name" . }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "k8s-sentinel.name" . }}
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: {{ include "k8s-sentinel.serviceAccountName" . }}
      {{- if .Values.sandbox.enabled }}
      runtimeClassName: {{ .Values.sandbox.runtimeClassName | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: control-plane
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if eq .Values.mode "hybrid" }}
          # Hybrid mode: run the read-only agent, which dials OUT to the relay.
          command: ["node", "dist/cli.js", "agent"]
          {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: SENTINEL_ENGINE
              value: {{ .Values.engine.kind | quote }}
            - name: SENTINEL_MODEL_COLLECTOR
              value: {{ .Values.engine.models.collector | quote }}
            - name: SENTINEL_MODEL_ANALYST
              value: {{ .Values.engine.models.analyst | quote }}
            - name: SENTINEL_MODEL_AUTHOR
              value: {{ .Values.engine.models.author | quote }}
            - name: API_PORT
              value: {{ .Values.service.port | quote }}
            # --- ARGUS v3 -----------------------------------------------------
            # The tunnel-client honours these when the scan command arrives.
            # SENTINEL_SCANNER=argus is the production default (v3 attack-graph);
            # 'builtin' keeps the legacy TS orchestrator reachable for rollback.
            - name: SENTINEL_SCANNER
              value: {{ .Values.argus.scanner | quote }}
            {{- if .Values.argus.imagesOnly }}
            - name: ARGUS_IMAGES_ONLY
              value: "1"
            {{- end }}
            {{- if .Values.argus.noNetwork }}
            - name: ARGUS_NO_NETWORK
              value: "1"
            {{- end }}
            {{- if and .Values.argus.acceptedRisks.enabled .Values.argus.acceptedRisks.configMapName }}
            - name: ARGUS_ACCEPTED_RISKS_DIR
              value: /etc/sentinel/accepted-risks
            {{- end }}
            # Writable cache dirs for the scanners. The container runs
            # readOnlyRootFilesystem, so every tool that downloads a DB / caches
            # artifacts must write under the /tmp emptyDir, not /app or $HOME.
            # (F12: scans crashed with "Read-only file system".)
            - name: HOME
              value: /tmp                       # kubescape (~/.kubescape), generic $HOME caches
            - name: XDG_CACHE_HOME
              value: /tmp/.cache
            - name: TRIVY_CACHE_DIR
              value: /tmp/trivy                 # Trivy vuln-DB download
            - name: ARGUS_CACHE_DIR
              value: /tmp/argus-cache           # ARGUS threat-intel cache
            - name: CLUSTER_NAME
              value: {{ .Release.Name | quote }}
            {{- if eq .Values.engine.kind "hermes" }}
            - name: HERMES_BASE_URL
              value: {{ .Values.engine.hermes.baseUrl | quote }}
            - name: HERMES_MODEL
              value: {{ .Values.engine.hermes.model | quote }}
            {{- else if .Values.engine.apiKeySecret }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.engine.apiKeySecret }}
                  key: ANTHROPIC_API_KEY
            {{- end }}
            {{- if eq .Values.mode "hybrid" }}
            - name: RELAY_URL
              value: {{ required "relay.url is required when mode=hybrid" .Values.relay.url | quote }}
            - name: SENTINEL_CLUSTER_NAME
              value: {{ .Release.Name | quote }}
            {{- if .Values.relay.installTokenSecret }}
            - name: SENTINEL_INSTALL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.relay.installTokenSecret }}
                  key: SENTINEL_INSTALL_TOKEN
            {{- else if .Values.relay.installToken }}
            - name: SENTINEL_INSTALL_TOKEN
              value: {{ .Values.relay.installToken | quote }}
            {{- end }}
            {{- if .Values.relay.clientCertSecret }}
            - name: RELAY_CLIENT_CERT
              value: /etc/sentinel/relay-certs/tls.crt
            - name: RELAY_CLIENT_KEY
              value: /etc/sentinel/relay-certs/tls.key
            - name: RELAY_CA
              value: /etc/sentinel/relay-certs/ca.crt
            {{- end }}
            {{- end }}
          {{- if ne .Values.mode "hybrid" }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          {{- end }}
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              # The agent/server write ./data (sqlite + audit) relative to the
              # image WORKDIR (/app); mount the writable volume there so it works
              # under readOnlyRootFilesystem.
              mountPath: /app/data
            {{- if and (eq .Values.mode "hybrid") .Values.relay.clientCertSecret }}
            - name: relay-certs
              mountPath: /etc/sentinel/relay-certs
              readOnly: true
            {{- end }}
            {{- if and .Values.argus.acceptedRisks.enabled .Values.argus.acceptedRisks.configMapName }}
            - name: accepted-risks
              mountPath: /etc/sentinel/accepted-risks
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          emptyDir: {}
        {{- if and (eq .Values.mode "hybrid") .Values.relay.clientCertSecret }}
        - name: relay-certs
          secret:
            secretName: {{ .Values.relay.clientCertSecret }}
        {{- end }}
        {{- if and .Values.argus.acceptedRisks.enabled .Values.argus.acceptedRisks.configMapName }}
        - name: accepted-risks
          configMap:
            name: {{ .Values.argus.acceptedRisks.configMapName | quote }}
            optional: false
        {{- end }}
