{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k8s-sentinel.serviceAccountName" . }}
  labels:
    {{- include "k8s-sentinel.labels" . | nindent 4 }}
automountServiceAccountToken: true
---
# Read-only ClusterRole. By design this grants ONLY get/list/watch. The agent
# never needs write; remediation is emitted as PRs for human approval, never
# applied in-cluster (BUILD.md §10). Do not add create/update/patch/delete here.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-sentinel.fullname" . }}-readonly
  labels:
    {{- include "k8s-sentinel.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - endpoints
      - nodes
      - namespaces
      - serviceaccounts
      - configmaps
      - persistentvolumes
      - persistentvolumeclaims
      - replicationcontrollers
    verbs: ["get", "list", "watch"]
  # NOTE: Secrets are intentionally limited to metadata-level discovery, not
  # data reads. The Analyst reasons about *reachability* of secrets, never
  # their contents.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-sentinel.fullname" . }}-readonly
  labels:
    {{- include "k8s-sentinel.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-sentinel.fullname" . }}-readonly
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-sentinel.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
