{{- if .Values.egress.enabled }}
# Default-deny egress with an explicit allow-list (BUILD.md §10).
# In Hermes / air-gap mode, set egress.allow to [] for ZERO external calls —
# DNS + in-cluster API are the only permitted destinations.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "k8s-sentinel.fullname" . }}-egress
  labels:
    {{- include "k8s-sentinel.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "k8s-sentinel.name" . }}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow the in-cluster API server (read-only scanning).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
{{- end }}
