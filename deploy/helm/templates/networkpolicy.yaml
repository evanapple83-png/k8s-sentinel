{{- if .Values.egress.enabled }}
{{- /* Air-gap only when the engine is local AND we're not dialing a hosted relay. */}}
{{- $airgap := and (eq .Values.engine.kind "hermes") (ne .Values.mode "hybrid") }}
# Default-deny egress with an explicit allow-list (BUILD.md §10).
#
# - Always: DNS, plus in-cluster / private-CIDR traffic on 443 (kube-apiserver,
#   read-only scanning) and the local model port (an in-cluster Hermes).
# - CLAUDE mode: additionally permits 443 to the wider network so the managed
#   model API is reachable. Tighten `egress.privateCidrs` to your egress proxy.
# - HERMES (air-gap) mode: NO public egress is rendered at all — the model runs
#   in-cluster, so only DNS + private CIDRs are allowed. ZERO external calls.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "k8s-sentinel.fullname" . }}-egress
  labels:
    {{- include "k8s-sentinel.labels" . | nindent 4 }}
  annotations:
    k8s-sentinel.io/mode: {{ ternary "air-gap" "connected" $airgap | quote }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "k8s-sentinel.name" . }}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # In-cluster / private destinations: kube-apiserver (RO scan) + local model.
    - to:
        {{- range .Values.egress.privateCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: {{ .Values.egress.localModelPort }}
  {{- if not $airgap }}
    # Connected mode: reach the managed model API and/or the hosted relay over 443.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
  {{- end }}
{{- end }}
