# Exposes the control-plane API (SSE) to the dashboard and `kubectl port-forward`.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-sentinel.fullname" . }}
  labels:
    {{- include "k8s-sentinel.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "k8s-sentinel.name" . }}
    app.kubernetes.io/component: control-plane
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
