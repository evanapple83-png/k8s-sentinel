# ARGUS — on-demand scan Job.
#
# Runs once: kubectl apply -f deploy/job.yaml -n argus-system
#   then:    kubectl logs -n argus-system -l app.kubernetes.io/name=argus -f
#
# Output goes to stdout (the engine's summary) and to an emptyDir mounted at
# /var/argus/out. Re-deploy with `kubectl delete job/argus-scan -n argus-system`
# first.
#
# Hardening:
#   - runs as the ``argus`` ServiceAccount from rbac.yaml (read-only RBAC)
#   - nonroot user, no privilege escalation, no capabilities, seccomp default
#   - read-only root filesystem; only /var/argus/out and /tmp are writable
#   - no host network / host PID / host mounts
apiVersion: batch/v1
kind: Job
metadata:
  name: argus-scan
  namespace: argus-system
  labels:
    app.kubernetes.io/name: argus
    app.kubernetes.io/component: scan
    app.kubernetes.io/part-of: argus
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400   # auto-clean after 24h
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argus
        app.kubernetes.io/component: scan
    spec:
      serviceAccountName: argus
      automountServiceAccountToken: true
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: argus
          image: ghcr.io/your-org/argus:latest        # build via top-level Dockerfile
          imagePullPolicy: IfNotPresent
          args:
            - scan
            - --in-cluster
            - --cluster-name=$(CLUSTER_NAME)
            - --out=/var/argus/out
          env:
            - name: CLUSTER_NAME
              value: "kubernetes"
            # If you mount accepted-risk policies as a ConfigMap, pass:
            # - name: ARGUS_ACCEPTED_RISKS
            #   value: /etc/argus/accepted-risks
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: out
              mountPath: /var/argus/out
            - name: tmp
              mountPath: /tmp
            # Mount a ConfigMap of accepted-risk .md files if you use them:
            # - name: accepted-risks
            #   mountPath: /etc/argus/accepted-risks
            #   readOnly: true
      volumes:
        - name: out
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        # - name: accepted-risks
        #   configMap:
        #     name: argus-accepted-risks
