name: Publish agent image

# Builds the in-cluster agent image and pushes it to GitHub Container Registry.
# Runs on the GitHub runners (no local Docker needed) using the built-in token.
#
# Unified image: TS tunnel-client + Python ARGUS engine + bundled scanner
# binaries (Trivy / kube-bench / Kubescape, versions pinned in the Dockerfile).

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      # ARGUS Python pipeline is baked into the image; a change here is also
      # a supply-chain change to the published artifact and must rebuild.
      - 'argus/**'
      - 'requirements.txt'
      - 'pnpm-lock.yaml'
      - 'deploy/helm/**'
      - '.github/workflows/publish-images.yml'
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  agent-image:
    runs-on: ubuntu-latest
    outputs:
      # Immutable manifest-list digest of the image built this run; the chart job
      # pins the chart to it so the published chart is fully reproducible. (F13)
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      # QEMU lets the amd64 runner cross-build the arm64 variant. The Dockerfile
      # is already TARGETARCH-aware (Trivy/kube-bench/Kubescape per-arch assets),
      # so this just produces a multi-arch manifest list.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/k8s-sentinel
          # Keep `latest` floating on main; pin the chart-referenced tag
          # `0.2.0-argus-v3` here so `helm install` finds it.
          tags: |
            type=raw,value=0.2.0-argus-v3
            type=raw,value=argus-v3
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          # Multi-arch so the agent runs on arm64 nodes too — Apple Silicon local
          # clusters (OrbStack/Docker Desktop/kind) and arm64 cloud (Graviton),
          # not just amd64. (Finding F3, 2026-05-29.)
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Publishes the Helm chart as an OCI artifact so the Connect screen's
  # `helm install oci://ghcr.io/<owner>/k8s-sentinel --version <x>` resolves.
  # Same package as the agent image, but tagged by CHART version (Chart.yaml
  # `version:`, e.g. 0.2.0) — no overlap with the image's appVersion tags
  # (0.2.0-argus-v3 / argus-v3 / latest), so the two artifact types coexist and
  # the chart inherits the package's (public) visibility. The Connect screen
  # verifies the pushed artifact is a Helm chart before showing the command.
  helm-chart:
    runs-on: ubuntu-latest
    # Wait for the image so we can pin the chart to its immutable digest.
    needs: agent-image
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Lint chart
        run: helm lint deploy/helm

      - name: Pin chart to the image digest (F13 — immutable, reproducible)
        env:
          DIGEST: ${{ needs.agent-image.outputs.digest }}
        run: |
          set -euo pipefail
          if [ -z "${DIGEST:-}" ]; then echo "no image digest from agent-image job" >&2; exit 1; fi
          echo "Pinning image.digest=${DIGEST}"
          # values.yaml ships `digest: ""`; replace with the just-built digest so
          # the published chart references the image by digest, not the mutable tag.
          sed -i "s|^  digest: \"\"|  digest: \"${DIGEST}\"|" deploy/helm/values.yaml
          grep -n "digest:" deploy/helm/values.yaml

      - name: Log in to ghcr.io (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package & push chart
        run: |
          set -euo pipefail
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm package deploy/helm -d dist
          chart=$(ls dist/*.tgz)
          echo "Pushing $chart → oci://ghcr.io/$owner"
          helm push "$chart" "oci://ghcr.io/$owner"
