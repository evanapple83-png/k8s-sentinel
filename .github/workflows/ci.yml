name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No `version:` here — pnpm/action-setup@v4 refuses to be ambiguous when
      # package.json already pins it via `packageManager`. The version comes
      # from package.json (pnpm@11.3.0) which is also what `corepack` uses.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # pnpm@11.3.0 (pinned in package.json `packageManager`) requires
          # Node ≥22.13. The agent image is built on Node 24, so 22 is the
          # smallest viable runtime that matches both pnpm + the store's
          # `node:sqlite` built-in.
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm
      - run: helm template sentinel deploy/helm > /dev/null
